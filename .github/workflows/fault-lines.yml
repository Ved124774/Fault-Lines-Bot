name: Fault Lines Bot

on:
  schedule:
    # Bluesky: 3 times daily (roughly morning, afternoon, evening UK time)
    - cron: '0 8 * * *'
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'

    # Newsletter: Wednesday and Sunday at 5pm UK time (4pm UTC covers BST;
    # close enough year-round, adjust by 1 hour in winter if you want it exact)
    - cron: '0 16 * * 3'
    - cron: '0 16 * * 0'

  workflow_dispatch:
    inputs:
      run_type:
        description: 'What to run'
        required: true
        default: 'bluesky'
        type: choice
        options:
          - bluesky
          - newsletter
          - both

jobs:
  bluesky-post:
    name: Bluesky Daily Run
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 8 * * *' ||
        github.event.schedule == '0 13 * * *' ||
        github.event.schedule == '0 18 * * *'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.run_type == 'bluesky' ||
        github.event.inputs.run_type == 'both'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Bluesky bot
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: python bluesky_bot.py

  newsletter:
    name: Newsletter Run
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'schedule' && (
        github.event.schedule == '0 16 * * 3' ||
        github.event.schedule == '0 16 * * 0'
      )) ||
      (github.event_name == 'workflow_dispatch' && (
        github.event.inputs.run_type == 'newsletter' ||
        github.event.inputs.run_type == 'both'
      ))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Newsletter bot
        working-directory: scripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BEEHIIV_API_KEY: ${{ secrets.BEEHIIV_API_KEY }}
          BEEHIIV_PUBLICATION_ID: ${{ secrets.BEEHIIV_PUBLICATION_ID }}
        run: python newsletter_bot.py
